# Sched-IR resource description for the da4ml backend.
#
# This file describes WHICH kernels claim WHICH Sched-IR primitives and what
# constraints must hold for a binding to be legal. The actual cost/latency
# numbers come from `cost_query` callables resolved in
# `IR/Sched-IR/kernels.py` — they call into da4ml at runtime
# (`cmvm.api.solve`, `comb_trace`, etc.) rather than encoding any formula
# here. Static formulas are reserved for the scheduler-inserted infrastructure
# kernels (register/bram buffers and muxes), where da4ml has nothing to say.

framework: da4ml

# Parameters that flow into da4ml's adder-cell cost model
# (cmvm.core.state_opr.cost_add). The defaults below match the Xilinx VU13P
# (LUT6 carry chains). Override per device.
fpga:
  device: VU13P
  adder_size: -1     # -1 = ideal-adder mode (1 cell per addition); set to 6 for LUT6
  carry_size: -1     # -1 = ideal latency mode (1 cycle per addition); set to 4 for VU13P CARRY8

kernels:

  # ---- Compute kernels (da4ml-driven cost queries) -------------------- #

  da4ml_dense:
    supported_ops: [dense]
    constraints:
      weight_source: constant
    instances: unlimited
    cost_query: da4ml_dense_cost
    notes: |
      Calls `da4ml.cmvm.api.solve(kernel, qintervals, adder_size, carry_size)`
      directly with the constant kernel from the Keras layer. Returns the
      rolled-up `.cost` (adder-cell count) and `.latency` from the resulting
      CascadedSolution.

  da4ml_reduce:
    supported_ops: [reduce]
    instances: unlimited
    cost_query: da4ml_reduce_cost
    notes: |
      Builds a `FixedVariableArray.from_kif(...)` of the input shape, runs
      `np.sum / np.amax / np.amin` (per `op_params.mode`), then `comb_trace`
      → Solution.cost / Solution.latency.

  da4ml_elementwise:
    supported_ops: [elementwise]
    instances: unlimited
    cost_query: da4ml_elementwise_cost
    notes: |
      Lowers add/sub/mul/max/min through FixedVariable operator overloads
      (`a + b`, `a * b`, …) on broadcast-aligned FixedVariableArray inputs,
      then `comb_trace` → cost/latency.

  da4ml_activation:
    supported_ops: [activation]
    instances: unlimited
    cost_query: da4ml_activation_cost
    notes: |
      ReLU lowers via `da4ml.trace.ops.relu` over a FixedVariableArray.
      sigmoid/tanh/softmax fall through to a TODO LUT estimator (not used by
      JEDI-linear).

  # ---- Scheduler-inserted infrastructure (closed-form cost) ----------- #

  register_buffer:
    supported_ops: [buffer]
    constraints:
      max_depth: 64
    instances: unlimited
    cost_query: register_buffer_cost
    inserted_by: scheduler
    notes: "FF cost = depth × width_bits, latency = 1 cycle, ii = 1."

  bram_buffer:
    supported_ops: [buffer]
    constraints:
      min_depth: 64
    instances: limited
    max_instances: 2688          # VU13P BRAM count
    cost_query: bram_buffer_cost
    inserted_by: scheduler
    notes: "BRAM = ceil(depth × width_bits / 36864), latency = 2 cycles, ii = 1."

  lut_mux:
    supported_ops: [mux]
    instances: unlimited
    cost_query: lut_mux_cost
    inserted_by: scheduler
    notes: "LUT cost = ceil(log2(n_inputs)) × width_bits, latency = 0 (combinational)."
